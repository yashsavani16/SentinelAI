---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: api-gateway
          image: demo-api-gateway:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: CHECKOUT_SERVICE_URL
              value: "http://checkout-service:8001"
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service:8002"
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: demo-app
spec:
  selector:
    app: api-gateway
  ports:
    - port: 8000
      targetPort: 8000
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-service
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: checkout-service
  template:
    metadata:
      labels:
        app: checkout-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: checkout-service
          image: demo-checkout-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8001
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: ERROR_RATE
              value: "0.15"
            - name: SLOW_RATE
              value: "0.20"
            - name: CHAOS_MODE
              valueFrom:
                configMapKeyRef:
                  name: demo-config
                  key: chaos_mode
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-service
  namespace: demo-app
spec:
  selector:
    app: checkout-service
  ports:
    - port: 8001
      targetPort: 8001
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inventory-service
          image: demo-inventory-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          env:
            - name: SLOW_QUERY_RATE
              value: "0.25"
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: demo-app
spec:
  selector:
    app: inventory-service
  ports:
    - port: 8002
      targetPort: 8002
  type: LoadBalancer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-generator
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: load-generator
  template:
    metadata:
      labels:
        app: load-generator
    spec:
      containers:
        - name: load-generator
          image: demo-load-generator:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8003
          env:
            - name: GATEWAY_URL
              value: "http://api-gateway:8000"
            - name: RPS
              value: "5"
            - name: BURST_RPS
              value: "20"
---
apiVersion: v1
kind: Service
metadata:
  name: load-generator
  namespace: demo-app
spec:
  selector:
    app: load-generator
  ports:
    - port: 8003
      targetPort: 8003
  type: LoadBalancer
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: demo-config
  namespace: demo-app
data:
  chaos_mode: "false"
