apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki
  namespace: demo-app
spec:
  serviceName: "loki"
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.7
          ports:
            - containerPort: 3100
          args:
            - "-config.file=/etc/loki/local-config.yaml"
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: demo-app
spec:
  selector:
    app: loki
  ports:
    - port: 3100
      targetPort: 3100
  type: LoadBalancer
