apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: demo-app
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s
    
    rule_files:
      - /etc/prometheus/alerts.yml
        
    alerting:
      alertmanagers:
        - static_configs:
            - targets: ["alertmanager.demo-app.svc.cluster.local:9093"]
            
    scrape_configs:
      - job_name: "prometheus"
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: "api-gateway"
        static_configs:
          - targets: ["api-gateway.demo-app.svc.cluster.local:8000"]

      - job_name: "checkout-service"
        static_configs:
          - targets: ["checkout-service.demo-app.svc.cluster.local:8001"]

      - job_name: "inventory-service"
        static_configs:
          - targets: ["inventory-service.demo-app.svc.cluster.local:8002"]

  alerts.yml: |
    groups:
      - name: checkout-service
        rules:
          - alert: CheckoutHighErrorRate
            expr: |
              (
                sum by(service) (rate(http_errors_total{service="checkout-service"}[5m]))
                /
                sum by(service) (rate(http_requests_total{service="checkout-service"}[5m]))
              ) > 0.10
            for: 2m
            labels:
              severity: critical
              service: checkout-service
            annotations:
              summary: "High error rate on checkout-service"
              description: "checkout-service error rate is {{ humanizePercentage $value }} over the last 5 minutes."

          - alert: CheckoutHighLatency
            expr: |
              histogram_quantile(0.95,
                rate(http_request_duration_seconds_bucket{service="checkout-service"}[5m])
              ) > 1.5
            for: 3m
            labels:
              severity: warning
              service: checkout-service
            annotations:
              summary: "High p95 latency on checkout-service"
              description: "checkout-service p95 latency is {{ humanizeDuration $value }} (threshold: 1.5s)."

          - alert: PaymentFailureSpike
            expr: rate(payment_failures_total[5m]) > 0.5
            for: 1m
            labels:
              severity: critical
              service: checkout-service
            annotations:
              summary: "Payment failure spike"
              description: "Payment failures at {{ $value | humanize }} per second."

      - name: inventory-service
        rules:
          - alert: InventorySlowQueries
            expr: |
              histogram_quantile(0.90,
                rate(db_query_duration_seconds_bucket{job="inventory-service"}[5m])
              ) > 1.0
            for: 3m
            labels:
              severity: warning
              service: inventory-service
            annotations:
              summary: "Slow DB queries on inventory-service"
              description: "inventory-service p90 DB query latency is {{ humanizeDuration $value }}."

          - alert: InventoryHighErrorRate
            expr: |
              rate(http_errors_total{service="inventory-service"}[5m]) > 0.2
            for: 2m
            labels:
              severity: warning
              service: inventory-service
            annotations:
              summary: "Elevated error rate on inventory-service"
              description: "inventory-service error rate is {{ $value | humanize }} errors/sec."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: demo-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--web.enable-lifecycle"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: demo-app
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
  type: LoadBalancer
