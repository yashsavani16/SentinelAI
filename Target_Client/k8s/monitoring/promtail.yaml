apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: demo-app
data:
  promtail.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki:3100/loki/api/v1/push

    scrape_configs:
      - job_name: demo-app-logs
        static_configs:
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: api-gateway
              __path__: /var/log/pods/demo-app_api-gateway-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: checkout-service
              __path__: /var/log/pods/demo-app_checkout-service-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: inventory-service
              __path__: /var/log/pods/demo-app_inventory-service-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: load-generator
              __path__: /var/log/pods/demo-app_load-generator-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: alertmanager
              __path__: /var/log/pods/demo-app_alertmanager-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: prometheus
              __path__: /var/log/pods/demo-app_prometheus-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: loki
              __path__: /var/log/pods/demo-app_loki-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: grafana
              __path__: /var/log/pods/demo-app_grafana-*/*/*.log
          - targets: [localhost]
            labels:
              job: kubernetes-pods
              namespace: demo-app
              service: chaos-panel
              __path__: /var/log/pods/demo-app_chaos-panel-*/*/*.log
        pipeline_stages:
          - cri: {}
          - json:
              expressions:
                level:     level
                message:   message
                timestamp: timestamp
          - labels:
              level:
          - timestamp:
              source: timestamp
              format: "2006-01-02T15:04:05"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: demo-app
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      containers:
        - name: promtail
          image: grafana/promtail:2.9.7
          args:
            - -config.file=/etc/promtail/promtail.yml
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlogpods
              mountPath: /var/log/pods
              readOnly: true
            - name: dockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlogpods
          hostPath:
            path: /var/log/pods
        - name: dockercontainers
          hostPath:
            path: /var/lib/docker/containers
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "watch", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: demo-app
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: demo-app
