version: '3.8'

# =============================================================================
# SaaS Platform Stack — API, Dashboard, AI Agent, and infrastructure services
#
# All Dockerfiles for this stack live in platform/.
# All AI reasoning (LLM, LangGraph, OODA loop) happens here.
# Tool calls are dispatched directly to the edge MCP stack on host ports.
#
# Usage:  cd platform && docker compose up -d --build
# =============================================================================

services:
  # ============================================
  # Infrastructure Services
  # ============================================

  redis:
    image: redis:7-alpine
    container_name: sre-redis
    hostname: redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      sre-network:
        aliases:
          - redis
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    container_name: sre-postgres
    hostname: postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-sre_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sre_password}
      - POSTGRES_DB=${POSTGRES_DB:-sre_platform}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      sre-network:
        aliases:
          - postgres
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sre_user} -d ${POSTGRES_DB:-sre_platform}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sre-qdrant
    hostname: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      sre-network:
        aliases:
          - qdrant
    restart: unless-stopped

  # ollama:                        # Commented out — using Groq instead
  #   image: ollama/ollama:latest
  #   container_name: sre-ollama
  #   hostname: ollama
  #   ports:
  #     - "11435:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     sre-network:
  #       aliases:
  #         - ollama
  #   restart: unless-stopped

  # ============================================
  # SRE Agent API (Control Plane + AI Brain)
  # ============================================

  sre-agent-api:
    platform: linux/amd64
    build:
      context: ../
      dockerfile: platform/Dockerfile
    container_name: sre-agent-api
    hostname: sre-agent-api
    command: >
      sh -c "uv run alembic upgrade head && uv run python backend/seed.py && exec uv run uvicorn sre_agent.agent_runtime:app --host 0.0.0.0 --port 8080"
    ports:
      - "8080:8080"
    environment:
      - SECRET_KEY=${SECRET_KEY:-sre_platform_dev_key_change_in_production}
      - AGENT_MODE=api
      - CLUSTER_TOKEN=${CLUSTER_TOKEN:-}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@example.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-admin}
      - SEED_ADMIN_ORG=${SEED_ADMIN_ORG:-SRE Admin Org}
      - SEED_CLUSTER_TOKEN=${SEED_CLUSTER_TOKEN:-}
      - SEED_CLUSTER_NAME=${SEED_CLUSTER_NAME:-SRE Demo Cluster}
      - SEED_CLUSTER_STATUS=${SEED_CLUSTER_STATUS:-online}

      # LLM (runs on platform, not customer edge)
      # Primary: nvidia → fallback: gemini → fallback: groq → fallback: ollama
      - LLM_PROVIDER=${LLM_PROVIDER:-nvidia}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - NVIDIA_MODEL=${NVIDIA_MODEL:-meta/llama-3.3-70b-instruct}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${OLLAMA_MODEL:-gemma3:1b}
      - OLLAMA_NUM_CTX=${OLLAMA_NUM_CTX:-32768}

      # Infrastructure
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-sre_user}:${POSTGRES_PASSWORD:-sre_password}@postgres:5432/${POSTGRES_DB:-sre_platform}
      - PROMETHEUS_URL=http://host.docker.internal:9090

      # MCP servers live in edge_mcp_servers/ and are reached over host ports
      - MCP_K8S_URI=${MCP_K8S_URI:-http://host.docker.internal:4000/sse}
      - MCP_METRICS_URI=${MCP_METRICS_URI:-http://host.docker.internal:4001/sse}
      - MCP_LOGS_URI=${MCP_LOGS_URI:-http://host.docker.internal:4002/sse}
      - MCP_GITHUB_URI=${MCP_GITHUB_URI-}
      - MCP_RUNBOOKS_URI=${MCP_RUNBOOKS_URI:-http://host.docker.internal:4004/sse}

      # Python
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DEBUG=${DEBUG:-false}

      # LangSmith tracing (optional — leave blank to disable)
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_PROJECT=${LANGCHAIN_PROJECT:-sre-agent}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY:-}

    networks:
      sre-network:
        aliases:
          - sre-agent
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    restart: unless-stopped

  # ============================================
  # Dashboard (Next.js UI)
  # ============================================

  dashboard:
    platform: linux/amd64
    build:
      context: ../dashboard
      dockerfile: ../platform/Dockerfile.dashboard
    container_name: sre-dashboard
    ports:
      - "3002:3000"
    environment:
      - API_URL=http://sre-agent-api:8080
    depends_on:
      - sre-agent-api
    networks:
      sre-network:
        aliases:
          - dashboard

networks:
  sre-network:
    driver: bridge
    name: sre-platform-network

volumes:
  redis_data:
    driver: local
  qdrant_data:
    driver: local
  # ollama_data:                   # Commented out — using Groq instead
  #   driver: local
  postgres_data:
    driver: local
